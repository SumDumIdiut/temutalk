
  <!-- Top bar -->
  <div class="home-topbar">
    <span class="chip" id="spotify-chip"><span class="dot"></span> Spotify</span>
    <button class="hub-bar-btn cast-btn" onclick="setCastMode(!castMode)" title="Cast audio from host">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm18-7H5c-1.1 0-2 .9-2 2v3h2v-3h14v10h-5v2h5c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-18 11v2h2v-2H1z"/></svg>
    </button>
    <button class="hub-bar-btn" id="fs-btn" onclick="toggleFullscreen()" title="Fullscreen">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path id="fs-path" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>
  </div>

  <!-- Hero clock -->
  <div class="home-hero">
    <div class="home-greeting" id="home-greeting">Good morning</div>
    <div class="home-time" id="clock">--:--</div>
    <div class="home-datestr" id="dateline">--</div>
  </div>

  <!-- Bottom compact widgets -->
  <div class="home-widgets">

    <!-- Mini weather -->
    <div class="home-mini-card home-mini-wx" id="home-wx-card">
      <div id="home-wx-display" style="display:flex;align-items:center;gap:14px;width:100%;">
        <div class="home-mini-wx-icon" id="w-icon" onclick="navigate('weather')" style="cursor:pointer;">⛅</div>
        <div style="flex:1;min-width:0;cursor:pointer;" onclick="navigate('weather')">
          <div class="home-mini-wx-temp" id="w-temp">--°</div>
          <div class="home-mini-wx-desc" id="w-desc">Loading…</div>
          <div class="home-mini-wx-city" id="w-city"></div>
        </div>
        <button class="home-wx-edit-btn" onclick="homeWxEditStart(event)" title="Change city">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        </button>
      </div>
      <div class="home-wx-city-form" id="home-wx-edit">
        <input class="home-wx-city-inp" id="home-wx-city-inp" placeholder="City name…" autocomplete="off"
          onkeydown="if(event.key==='Enter')homeWxEditDone();if(event.key==='Escape')homeWxEditCancel();">
        <button class="home-wx-go-btn" onclick="homeWxEditDone()">→</button>
        <button class="home-wx-go-btn" onclick="homeWxEditCancel()" style="background:none;border-color:transparent;color:var(--text-muted);">✕</button>
      </div>
    </div>

    <!-- Mini music / radio -->
    <div class="home-mini-card home-mini-music" id="np-card">
      <div class="home-mini-music-hdr" id="home-audio-hdr" onclick="homeAudioHdrClick()" style="cursor:pointer;">
        <span class="home-mini-music-lbl" id="home-music-label">Music</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-muted);flex-shrink:0;"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </div>

      <!-- Spotify: playing -->
      <div id="home-np-playing" style="display:none;">
        <div class="home-np-flat">
          <img class="home-mini-art home-np-flat-art" id="home-np-art" src="" alt="" crossorigin="anonymous">
          <div class="home-np-flat-info">
            <div class="home-mini-track" id="home-np-track">—</div>
            <div class="home-mini-artist" id="home-np-artist">—</div>
          </div>
          <div class="home-np-flat-ctrls">
            <button class="home-mini-ctrl" onclick="action('previous')" tabindex="-1">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
            </button>
            <button class="home-mini-ctrl home-mini-ctrl-play" onclick="togglePlay()" tabindex="-1">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="home-play-icon"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="home-mini-ctrl" onclick="action('next')" tabindex="-1">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
          </div>
          <div class="home-np-flat-prog">
            <span class="home-mini-time" id="home-np-cur">0:00</span>
            <div class="progress-bar" style="flex:1;margin:0;">
              <div class="progress-fill" id="home-np-bar" style="width:0%"></div>
            </div>
            <span class="home-mini-time" id="home-np-tot">0:00</span>
          </div>
        </div>
      </div>

      <!-- Spotify: recent -->
      <div id="home-np-recent" onclick="navigate('music')" style="cursor:pointer;">
        <div id="home-recent-tracks"><div style="font-size:12px;color:var(--text-muted);padding:4px 0;">Loading…</div></div>
      </div>

      <!-- Radio: playing -->
      <div id="home-radio-playing-state" style="display:none;" onclick="event.stopPropagation()">
        <div class="home-mini-np-row">
          <img class="home-mini-art" id="home-radio-fav" src="" alt="" style="border-radius:8px;">
          <div style="flex:1;min-width:0;">
            <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:#e879f9;text-transform:uppercase;">Live Radio</div>
            <div class="home-mini-track" id="home-radio-name">—</div>
            <div class="home-mini-artist" id="home-radio-meta"></div>
          </div>
          <div class="home-radio-pulse" style="flex-shrink:0;"></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:10px;">
          <button class="home-radio-stop" onclick="stopRadio()" style="flex:1;">■ Stop</button>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-muted);flex-shrink:0;"><path d="M7 9v6h4l5 5V4l-5 5H7z"/></svg>
          <input type="range" class="home-np-vol" id="home-radio-vol" min="0" max="100" value="80" oninput="setRadioVolume(+this.value)" style="width:80px;">
        </div>
      </div>
    </div>

  </div>

  <!-- Hidden elements referenced by JS but not shown on this layout -->
  <div style="display:none;">
    <div id="home-np-album"></div>
    <input type="range" id="home-np-vol" min="0" max="100" value="50" oninput="setVolume(+this.value)">
    <div id="home-sw-display"></div>
    <div id="home-sw-label"></div>
    <div id="home-active-timers"></div>
    <div id="home-markets-card"></div>
    <div id="home-coins"></div>
  </div>

</div>
