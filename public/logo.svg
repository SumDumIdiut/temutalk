<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ff6900"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#ff6900" flood-opacity="0.45"/>
    </filter>
  </defs>
  <!-- Base rounded square -->
  <rect width="48" height="48" rx="13" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Shine overlay -->
  <rect width="48" height="48" rx="13" fill="url(#shine)"/>
  <!-- Audio waveform bars -->
  <rect x="8"  y="20" width="4" height="8"  rx="2" fill="white" opacity="0.55"/>
  <rect x="14" y="15" width="4" height="18" rx="2" fill="white" opacity="0.75"/>
  <rect x="20" y="10" width="4" height="28" rx="2" fill="white"/>
  <rect x="26" y="14" width="4" height="20" rx="2" fill="white" opacity="0.75"/>
  <rect x="32" y="19" width="4" height="10" rx="2" fill="white" opacity="0.55"/>
  <rect x="38" y="22" width="4" height="4"  rx="2" fill="white" opacity="0.35"/>
</svg>
