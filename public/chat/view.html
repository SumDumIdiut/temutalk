<div class="chat-wrap" style="position:relative">

  <!-- Login overlay -->
  <div class="chat-login-overlay" id="chat-login-overlay">
    <div class="chat-login-box">
      <div class="chat-login-title">Join Chat</div>
      <div class="chat-login-sub">Chat with everyone on TemuTalk</div>

      <a class="chat-oauth-btn discord" id="chat-discord-btn" href="#">
        <svg width="20" height="20" viewBox="0 0 71 55" fill="white"><path d="M60.1 4.9A58.5 58.5 0 0 0 45.6.6a41 41 0 0 0-1.8 3.7 54 54 0 0 0-16.3 0A40 40 0 0 0 25.7.6 58.4 58.4 0 0 0 11.1 4.9C1.6 19 -.9 32.7.3 46.2c6.2 4.6 12.2 7.4 18.1 9.2a44.5 44.5 0 0 0 3.8-6.2 38.2 38.2 0 0 1-6-2.9c.5-.4 1-.7 1.5-1.1a41.9 41.9 0 0 0 35.9 0c.5.4 1 .8 1.5 1.1a38 38 0 0 1-6 2.9 44.7 44.7 0 0 0 3.8 6.2c5.9-1.8 11.9-4.6 18.1-9.2 1.5-15.6-2.5-29.2-10.9-41.3ZM23.7 37.8c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2 6.5 3.3 6.4 7.2c0 3.9-2.8 7.2-6.4 7.2Zm23.6 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2 6.5 3.3 6.4 7.2c0 3.9-2.8 7.2-6.4 7.2Z"/></svg>
        Continue with Discord
      </a>

      <a class="chat-oauth-btn google" id="chat-google-btn" href="#">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.7-6.7C35.8 2.2 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6.1C12.3 13 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 7.1-10 7.1-17.3z"/><path fill="#FBBC05" d="M10.4 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.8-4.6L2.6 13.3A24 24 0 0 0 0 24c0 3.8.9 7.4 2.6 10.7l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.7 2.2-7.7 2.2-6.3 0-11.6-4.2-13.6-9.9l-7.8 6.1C6.6 42.6 14.6 48 24 48z"/></svg>
        Continue with Google
      </a>

      <div class="chat-login-divider">or use a username &amp; password</div>

      <input class="chat-name-inp" id="chat-name-inp" placeholder="Name…" maxlength="32" autocomplete="username"
        onkeydown="if(event.key==='Enter')document.getElementById('chat-pass-inp').focus()">
      <input class="chat-name-inp" id="chat-pass-inp" type="password" placeholder="Password…" maxlength="72" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')chatSaveName()">
      <button class="chat-name-save-btn" onclick="chatSaveName()">Sign in / Register →</button>
      <div class="chat-login-note">New here? An account is created automatically.</div>
      <div class="chat-login-err" id="chat-login-err"></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="chat-sidebar">
    <div class="chat-sidebar-hdr">
      <div class="chat-sidebar-title">Chat</div>
    </div>
    <div class="chat-sidebar-body" id="chat-sidebar-body">
      <div class="chat-room-item active" id="chat-room-global" data-room="global" onclick="chatOpenRoom('global')">
        <div class="chat-room-icon">🌐</div>
        <div class="chat-room-name">Global</div>
        <div class="chat-room-badge" id="chat-unread-global" style="display:none">0</div>
      </div>
      <div id="chat-friend-reqs"></div>
      <div class="chat-section-label">
        <span>Friends</span>
        <button class="chat-add-btn" title="Add friend" onclick="chatShowAddFriend()">+</button>
      </div>
      <div id="chat-friends-list"></div>
      <div class="chat-section-label">
        <span>Groups</span>
        <button class="chat-add-btn" title="Create or join a group" onclick="chatShowGroupMenu()">+</button>
      </div>
      <div id="chat-groups-list"></div>
      <div class="chat-account-row" id="chat-account-row" style="display:none">
        <div id="chat-account-avatar"></div>
        <div class="chat-account-name" id="chat-account-name"></div>
        <button class="chat-switch-btn" onclick="chatSwitchAccount()" title="Switch account">↩</button>
      </div>
      <div class="chat-device-id" id="chat-did-chip"></div>
    </div>
  </div>

  <!-- Main -->
  <div class="chat-main">
    <div class="chat-topbar">
      <div class="chat-room-title" id="chat-room-title">Global</div>
      <button class="chat-call-btn" id="chat-call-btn" onclick="chatToggleCall()">📞 Call</button>
    </div>
    <div class="chat-call-bar" id="chat-call-bar">
      <div class="chat-call-label">🔊 In call</div>
      <div class="chat-call-peers" id="chat-call-peers"></div>
      <button class="chat-mute-btn" id="chat-mute-btn" onclick="chatToggleMute()">Mute</button>
      <button class="chat-mute-btn" onclick="chatLeaveCall()" style="color:#ff8080">Leave</button>
    </div>
    <div class="chat-messages" id="chat-messages" style="position:relative;">
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-text">No messages yet. Say hello!</div>
      </div>
      <div class="chat-messages-inner" id="chat-messages-inner"></div>
    </div>
    <div class="chat-input-bar">
      <textarea class="chat-input" id="chat-input" placeholder="Message…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chatSend();}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
      <button class="chat-send-btn" onclick="chatSend()">Send</button>
    </div>
  </div>

</div>
