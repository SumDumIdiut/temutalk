  <style>
    /* ── SPA view system ─────────────────────────────────────────────────── */
    html, body { height: 100%; overflow: hidden; }

    .view {
      position: fixed; inset: 0; left: var(--nav-w); z-index: 1;
      display: none; overflow: hidden;
      transition: opacity 260ms cubic-bezier(0.4,0,0.2,1),
                  transform 260ms cubic-bezier(0.4,0,0.2,1);
    }
    .view.v-on { will-change: opacity, transform; }
    .view.v-on { display: block; }
    #view-weather.v-on, #view-timer.v-on,
    #view-finance.v-on, #view-system.v-on,
    #view-news.v-on {
      overflow-y: auto;
    }
    #view-home.v-on { overflow: hidden; display: flex; flex-direction: column; }
    #view-music.v-on  { display: flex; flex-direction: column; }

    /* weather needs extra scroll room */
    #view-weather .page {
      padding-bottom: 60px;
    }

    /* ── Nav buttons ─────────────────────────────────────────────────────── */
    button.nav-item { background: none; border: none; font-family: inherit; padding: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }

    /* ── Page headers ─────────────────────────────────────────────────────────────────── */
    .page-header { display: flex; align-items: center; gap: 10px; padding-top: 12px; font-size: 22px; font-weight: 600; }
    .page-header-accent { width: 4px; height: 28px; border-radius: 2px; flex-shrink: 0; }
  </style>
</head>

<script>
// ── Device identity ───────────────────────────────────────────────────────
if (!localStorage.getItem('deviceId'))
  localStorage.setItem('deviceId', ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16)));
const deviceId = localStorage.getItem('deviceId');

// ── Spotify credentials (localStorage only — never sent to/stored on server) ──
function getSpotifyCreds() {
  return {
    cid:  localStorage.getItem('spotifyClientId')     || '',
    csec: localStorage.getItem('spotifyClientSecret') || '',
  };
}
function updateAuthScreen() {
  const { cid, csec } = getSpotifyCreds();
  const hasCreds = !!(cid && csec);
  document.getElementById('creds-form').style.display   = hasCreds ? 'none' : '';
  document.getElementById('connect-form').style.display = hasCreds ? ''     : 'none';
  if (hasCreds) {
    document.getElementById('auth-link').href =
      '/auth/spotify?device=' + encodeURIComponent(deviceId) +
      '&cid='  + encodeURIComponent(cid) +
      '&csec=' + encodeURIComponent(csec);
  }
}

function showOAuthError(msg) {
  const el = document.getElementById('oauth-error');
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? '' : 'none';
}
function saveCreds() {
  const cid  = document.getElementById('input-cid').value.trim();
  const csec = document.getElementById('input-csec').value.trim();
  if (!cid || !csec) return;
  localStorage.setItem('spotifyClientId',     cid);
  localStorage.setItem('spotifyClientSecret', csec);
  updateAuthScreen();
}
function clearCreds() {
  localStorage.removeItem('spotifyClientId');
  localStorage.removeItem('spotifyClientSecret');
  updateAuthScreen();
}

// ── Lazy tab loader ───────────────────────────────────────────────────────
const _tabLoaded = { home: true }; // home is inline — already loaded

async function ensureTab(tab) {
  if (_tabLoaded[tab]) return;
  const r = await fetch('/' + tab + '/view.html');
  document.getElementById('view-' + tab).innerHTML = await r.text();
  _tabLoaded[tab] = true;
}

// ── Navigation ────────────────────────────────────────────────────────────
const TAB_IDX = { home: 0, music: 1, radio: 2, news: 3, weather: 4, finance: 5, timer: 6, system: 7 };
let curTab = 'home';

async function navigate(tab) {
  if (tab === curTab) return;
  await ensureTab(tab);

  document.body.dataset.tab = tab;
  const dir = TAB_IDX[tab] > TAB_IDX[curTab] ? 1 : -1;
  const $old = document.getElementById('view-' + curTab);
  const $new = document.getElementById('view-' + tab);

  // Set new view off-screen without transition
  $new.style.transition = 'none';
  $new.style.opacity = '0';
  $new.style.transform = 'translateX(' + (dir * 28) + 'px)';
  $new.classList.add('v-on');

  // Force reflow, then animate both
  $new.offsetHeight;
  $new.style.transition = '';
  $new.style.opacity = '1';
  $new.style.transform = '';
  $old.style.opacity = '0';
  $old.style.transform = 'translateX(' + (-dir * 28) + 'px)';

  const leaving = curTab;
  curTab = tab;

  setTimeout(() => {
    const $leaving = document.getElementById('view-' + leaving);
    $leaving.classList.remove('v-on');
    $leaving.style.opacity = '';
    $leaving.style.transform = '';
  }, 280);

  // Nav active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });

  // Lazy-load tabs on first visit
  if (tab === 'weather' && !wxLoaded) {
    wxLoaded = true;
    if (wxCity) loadWx(wxCity);
    else fetch('/api/config?device=' + deviceId).then(r => r.json()).then(c => { if (c.weatherCity) loadWx(c.weatherCity); else showWxError('No city set (WEATHER_CITY in .env)'); }).catch(() => showWxError('Could not load config'));
  }
  if (tab === 'music')   { if (typeof loadMusicHome === 'function') loadMusicHome(); }
  if (tab === 'timer')   initTimerView();
  if (tab === 'finance' && !financeLoaded) { financeLoaded = true; loadCrypto(); }
  if (tab === 'system')  { renderThemePanel(); }
  if (tab === 'radio') initRadioMap();
  if (tab === 'news' && !newsLoaded) loadNews();
  // Update URL
  const u = new URL(location.href);
  tab === 'home' ? u.searchParams.delete('tab') : u.searchParams.set('tab', tab);
  history.replaceState(null, '', u);
}

// Deep-link navigation deferred — see bottom of page (avoids TDZ for let vars used inside navigate)


// ── Theme settings ────────────────────────────────────────────────────────
const ACCENT_PRESETS = [
  { id:'red',      h:4,   s:85, label:'Red'      },

  { id:'yellow',   h:60,  s:88, label:'Yellow'    },
  { id:'lime',     h:80,  s:72, label:'Lime'      },
  { id:'green',    h:142, s:68, label:'Green'     },
  { id:'emerald',  h:160, s:70, label:'Emerald'   },
  { id:'teal',     h:174, s:72, label:'Teal'      },
  { id:'cyan',     h:188, s:88, label:'Cyan'      },
  { id:'sky',      h:200, s:90, label:'Sky'       },
  { id:'blue',     h:217, s:85, label:'Blue'      },
  { id:'royal',    h:228, s:82, label:'Royal'     },
  { id:'indigo',   h:240, s:80, label:'Indigo'    },
  { id:'violet',   h:262, s:72, label:'Violet'    },

function _hexToHsl(hex) {
  let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), l=(max+min)/2;
  if (max===min) return [0,0,Math.round(l*100)];
  const d=max-min, s=l>.5?d/(2-max-min):d/(max+min);
  let h;
  if (max===r) h=((g-b)/d+(g<b?6:0))/6;
  else if (max===g) h=((b-r)/d+2)/6;
  else h=((r-g)/d+4)/6;
  return [Math.round(h*360), Math.round(s*100)];
}

function _applyBlobColors(preset) {
  const cols = BLOB_PRESETS[preset];
  ['b1','b2','b3','b4'].forEach((cls, i) => {
    document.querySelectorAll('.' + cls).forEach(el => {
      el.style.background = cols ? `radial-gradient(circle, ${cols[i]} 0%, transparent 58%)` : '';
    });
  });
}

function _applyFont(id) {
  const fonts = {
    nunito:  { name:'Nunito',        url:'https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap' },
    inter:   { name:'Inter',         url:'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap' },
    poppins: { name:'Poppins',       url:'https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap' },
    grotesk: { name:'Space Grotesk', url:'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap' },
  };
  const f = fonts[id] || fonts.nunito;
  if (id !== 'nunito' && !document.querySelector(`link[data-font="${id}"]`)) {
    const lk = document.createElement('link'); lk.rel='stylesheet'; lk.href=f.url; lk.dataset.font=id;
    document.head.appendChild(lk);
  }
  document.body.style.fontFamily = `'${f.name}',-apple-system,BlinkMacSystemFont,sans-serif`;
}

function applyTheme() {
  const R = document.documentElement;

  // Accent color
  if (!themeAutoAccent) {
    let h, s;
    if (themeAccent === 'custom') {
      [h, s] = _hexToHsl(themeCustomHex);
    } else {
      const p = ACCENT_PRESETS.find(x => x.id === themeAccent) || ACCENT_PRESETS[16];
      h = p.h; s = p.s;
    }
    R.style.setProperty('--primary',      `hsl(${h},${s}%,73%)`);
    R.style.setProperty('--primary-dim',  `hsla(${h},${s}%,73%,.16)`);
    R.style.setProperty('--primary-dark', `hsla(${h},${s}%,73%,.12)`);
    R.style.setProperty('--primary-glow', `hsla(${h},${s}%,73%,.4)`);
  }

  // Dark level
  R.style.setProperty('--bg', { dark:'#08090f', darker:'#030408', amoled:'#000000' }[themeDark] || '#08090f');

  // Blobs visibility
  const bgEl = document.getElementById('bg');
  const showBlobs = (themeBg === 'vivid');
  if (bgEl) bgEl.style.display = showBlobs ? '' : 'none';

  // Blob colors (only relevant when blobs are shown)
  _applyBlobColors(showBlobs ? themeBlobs : 'auto');

  // Dot grid — always set explicitly so cascade doesn't interfere
  const showDots = (themeDotGrid !== 'off' && themeBg !== 'clean');
  document.body.style.backgroundImage = showDots
    ? 'radial-gradient(circle, rgba(255,255,255,.022) 1px, transparent 1px)'
    : 'none';
  document.body.style.backgroundSize = showDots ? '28px 28px' : '';

  // Glass
  const glass = {
    clear:   ['.13','.20','.28','.25'],
    mid:     ['.075','.12','.18','.18'],
    frosted: ['.04','.07','.11','.12'],
  }[themeGlass] || ['.075','.12','.18','.18'];
  R.style.setProperty('--surface',         `rgba(255,255,255,${glass[0]})`);
  R.style.setProperty('--surface-hi',      `rgba(255,255,255,${glass[1]})`);
  R.style.setProperty('--surface-highest', `rgba(255,255,255,${glass[2]})`);
  R.style.setProperty('--glass-border',    `rgba(255,255,255,${glass[3]})`);

  // Radius
  const rad = { pill:['24px','32px','42px'], rounded:['18px','26px','34px'], sharp:['8px','12px','18px'] }[themeRadius] || ['18px','26px','34px'];
  R.style.setProperty('--radius-sm', rad[0]);
  R.style.setProperty('--radius',    rad[1]);
  R.style.setProperty('--radius-lg', rad[2]);

  // Clock size
  const clk = document.querySelector('.home-time');
  if (clk) clk.style.fontSize = { xl:'clamp(80px,12vw,150px)', lg:'clamp(58px,9vw,110px)', md:'clamp(40px,6.5vw,78px)' }[themeClockSize] || 'clamp(80px,12vw,150px)';

  // Font
  _applyFont(themeFont);

  // Glow
  document.body.classList.toggle('no-glow', themeGlow === 'off');

  // Nav labels
  document.body.classList.toggle('no-nav-labels', themeNavLabels === 'hide');
}

const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function tick() {
  const n = new Date();
  let   h = n.getHours();
  const m = n.getMinutes().toString().padStart(2,'0');
  const greetEl = document.getElementById('home-greeting');
  if (greetEl) greetEl.textContent = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  const clk = document.getElementById('clock');
  if (themeClock === '12') {
    const ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    clk.innerHTML = h + ':' + m + '<span style="font-size:.32em;letter-spacing:0;margin-left:8px;vertical-align:middle;opacity:.7;">' + ampm + '</span>';
  } else {
    clk.textContent = h.toString().padStart(2,'0') + ':' + m;
  }
  document.getElementById('dateline').textContent =
    DAYS[n.getDay()] + ', ' + MONTHS[n.getMonth()] + ' ' + n.getDate();
}

// ── Home snippets ─────────────────────────────────────────────────────────
function loadHomeSnippets() {
  // Markets — 6 coins
  fetch('/api/crypto?ids=bitcoin,ethereum,solana,binancecoin,ripple,cardano&device=' + deviceId)
    .then(r => r.json()).then(data => {
      const el = document.getElementById('home-coins');
      if (!el || !Array.isArray(data)) return;
      const coins = data.slice(0, 6);
      el.innerHTML = coins.map(c => {
        const chg = c.price_change_percentage_24h || 0;
        const up  = chg >= 0;
        const p   = c.current_price >= 1000
          ? '$' + c.current_price.toLocaleString(undefined, {maximumFractionDigits: 0})
          : '$' + c.current_price.toLocaleString(undefined, {maximumFractionDigits: 4});
        return '<div class="home-coin-row">' +
          '<span class="home-coin-sym">' + esc(c.symbol.toUpperCase()) + '</span>' +
          '<span class="home-coin-price">' + p + '</span>' +
          '<span class="home-coin-chg ' + (up ? 'up' : 'down') + '">' + (up ? '+' : '') + chg.toFixed(2) + '%</span>' +
          '</div>';
      }).join('');
      const mktCard = document.getElementById('home-markets-card');
      if (mktCard && coins.length) {
        const avgChg = coins.reduce((s, c) => s + (c.price_change_percentage_24h || 0), 0) / coins.length;
        mktCard.classList.remove('mkt-up','mkt-down');
        mktCard.classList.add(avgChg >= 0 ? 'mkt-up' : 'mkt-down');
      }
    }).catch(() => { const el = document.getElementById('home-coins'); if (el) el.innerHTML = '<div class="home-snip-dim">Unavailable</div>'; });

  // Recently played music
  fetch('/api/recently-played?device=' + deviceId)
    .then(r => r.json()).then(data => {
      const el = document.getElementById('home-recent-tracks');
      if (!el) return;
      const items = (data.items || [])
        .filter((v, i, a) => a.findIndex(x => x.track?.id === v.track?.id) === i)
        .slice(0, 4);
      if (!items.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:4px 0;">Nothing played recently</div>'; return; }
      el.innerHTML = items.slice(0, 3).map(item => {
        const t = item.track || {};
        const name   = t.name || '—';
        const artist = (t.artists || []).map(a => a.name).join(', ') || '—';
        const img    = (t.album?.images?.[2] || t.album?.images?.[1] || t.album?.images?.[0])?.url || '';
        return '<div class="home-mini-recent-row">' +
          '<img class="home-mini-recent-art" src="' + esc(img) + '" alt="">' +
          '<div style="min-width:0;"><div class="home-mini-recent-name">' + esc(name) + '</div>' +
          '<div class="home-mini-recent-sub">' + esc(artist) + '</div></div>' +
          '</div>';
      }).join('');
    }).catch(() => {});
}

function tintMusicCard(src) {
  const card = document.getElementById('np-card');
  if (!card) return;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const cv = document.createElement('canvas');
      cv.width = cv.height = 8;
      const ctx = cv.getContext('2d');
      ctx.drawImage(img, 0, 0, 8, 8);
      const d = ctx.getImageData(0, 0, 8, 8).data;
      let r = 0, g = 0, b = 0, count = 0;
      for (let i = 0; i < d.length; i += 4) { r += d[i]; g += d[i+1]; b += d[i+2]; count++; }
      r = Math.round(r / count * 0.35);
      g = Math.round(g / count * 0.35);
      b = Math.round(b / count * 0.35);
      card.style.background = 'linear-gradient(140deg,rgb(' + r + ',' + g + ',' + b + ') 0%,var(--surface) 60%)';
    } catch(_) {}
  };
  img.src = src;
}

// Update active timers mini-card on home
function updateHomeTimers() {
  if (typeof timers === 'undefined') return;
  const card = document.getElementById('home-timer-card');
  const list = document.getElementById('home-timer-list');
  const active = timers.filter(t => !t.done);
  if (card) card.style.display = active.length ? '' : 'none';
  if (list) list.innerHTML = active.map(t => {
    const m = Math.floor(t.remaining / 60), s = t.remaining % 60;
    return '<div class="home-timer-row">' +
      '<span class="home-timer-row-name">' + esc(t.label || 'Timer') + '</span>' +
      '<span class="home-timer-row-val' + (t.running ? '' : ' home-timer-row-paused') + '">' +
      String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0') + '</span>' +
      '</div>';
  }).join('');
}

// ── Spotify WebSocket ─────────────────────────────────────────────────────
const chip = document.getElementById('spotify-chip');
function setChip(ok) {
  chip.className = 'chip ' + (ok ? 'ok' : 'err');
  chip.innerHTML = '<span class="dot"></span> Spotify ' + (ok ? 'connected' : 'disconnected');
}

const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
let ws, wsReady = false;
function wsConnect() {
  ws = new WebSocket(wsProto + '//' + location.host);
  ws.onopen = () => {
    wsReady = true;
    ws.send(JSON.stringify({ type: 'join', deviceId }));
  };
  ws.binaryType = 'arraybuffer';
  ws.onmessage = e => {
    if (e.data instanceof ArrayBuffer) {
      if (mseSBuffer) { msePending.push(e.data); mseFlush(); }
      return;
    }
    try {
      const m = JSON.parse(e.data);
      if (m.type === 'status') {
        setChip(m.authenticated);
        ensureTab('music').then(() => {
          updateAuthScreen();
          if (m.authenticated) { showApp(); loadMusicHome(); api('/api/player').then(onPlayer).catch(() => {}); }
          else showAuth();
        });
      }
      if (m.type === 'player') {
        setChip(m.authenticated);
        ensureTab('music').then(() => {
          if (m.authenticated) { showApp(); onPlayer(m); } else showAuth();
        });
      }
      if (m.type === 'mse-broadcaster-status') mseSetBroadcasterOnline(m.online, m.mimeType);
    } catch {}
  };
  ws.onclose = ws.onerror = () => {
    wsReady = false;
    setChip(false);
    setTimeout(wsConnect, 3000);
  };
}
wsConnect();

// ── Icecast stream player ─────────────────────────────────────────────────
let castAudio = null;
let castMode  = false;

function castConnect() {
  if (castAudio) { castAudio.pause(); castAudio.src = ''; }
  castAudio = new Audio('/stream?t=' + Date.now());
  castAudio.volume = (document.getElementById('home-np-vol')?.value ?? 80) / 100;
  castAudio.addEventListener('error',   () => { if (castMode) setTimeout(castConnect, 2000); });
  castAudio.addEventListener('stalled', () => { if (castMode) setTimeout(castConnect, 2000); });
  castAudio.addEventListener('ended',   () => { if (castMode) setTimeout(castConnect, 500); });
  castAudio.play().catch(e => console.warn('[cast]', e.message));
}

function castTeardown() {
  if (castAudio) { castAudio.pause(); castAudio.src = ''; castAudio = null; }
}

function getCastDelay() { return 0; }
function mseSetBroadcasterOnline() {}

function setCastMode(on) {
  castMode = on;
  document.querySelectorAll('.cast-btn').forEach(b => {
    b.classList.toggle('cast-active',    on);
    b.classList.toggle('cast-available', !on);
    const lbl = b.querySelector('.cast-lbl');
    if (lbl) lbl.textContent = on ? 'Connected' : 'Cast';
  });
  if (on) {
    castConnect();
  } else {
    castTeardown();
    if (radioStation) {
      ws.send(JSON.stringify({ type: 'host-stop-radio' }));
      radioStation = null;
      document.getElementById('rmap-np')?.classList.remove('vis');
      updateHomeRadio();
      renderRadioList(radioListFilter);
    }
  }
}

const FS_SHRINK = 'M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z';
function toggleFullscreen() {

document.addEventListener('fullscreenchange', () => {

<!-- Deep-link (after all tab scripts are loaded) -->
<script>
const _qs      = new URLSearchParams(location.search);
const _initTab = _qs.get('tab');
const _oauthErr = _qs.get('error');

if (['music','timer','finance','system','radio','weather','news'].includes(_initTab)) navigate(_initTab);

// Pre-warm music view in background so it's ready when user taps
ensureTab('music').then(() => {
  if (_oauthErr) {
    const msg = _oauthErr === 'invalid_client'    ? 'Invalid Client ID or Redirect URI mismatch — check your Spotify app settings.' :
                _oauthErr === 'state_mismatch'    ? 'Auth session expired — please try again.' :
                _oauthErr === 'auth_failed'       ? 'Spotify authorisation failed — check your Client ID and Secret.' :
                'Auth error: ' + _oauthErr.replace(/_/g, ' ');
    showOAuthError(msg);
    // Switch to connect-form so the error is visible
    const { cid, csec } = getSpotifyCreds();
    if (cid && csec) navigate('music');
  }
  // Clean the URL so the error doesn't persist on reload
  if (_oauthErr) history.replaceState(null, '', '/');
});
</script>
