<main class="page sports-page">
  <div class="sports-header">
    <div class="sports-title">Sports</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="sports-last-update" class="sports-updated"></span>
      <button class="sports-refresh-btn" onclick="sportsRefresh()">↻</button>
    </div>
  </div>

  <!-- Sport category tabs -->
  <div class="sports-cats" id="sports-cats"></div>

  <!-- League sub-chips (rendered by JS per sport) -->
  <div class="sports-leagues" id="sports-leagues"></div>

  <div id="sports-scoreboard">
    <div class="sports-loading">Loading scores…</div>
  </div>
</main>
