<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111318">
  <title>Select TemuTalk Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="hub-select-page">

  <div style="font-size:52px; margin-bottom:16px;">🛍️</div>
  <div class="hub-select-title">Choose a TemuTalk Hub</div>
  <div class="hub-select-sub">Select the hub this device should connect to</div>

  <div class="hub-grid" id="hub-grid">
    <div style="color:var(--text-muted);text-align:center;padding:32px 0;grid-column:1/-1;">
      Loading hubs…
    </div>
  </div>

</div>

<script>
  const saved = localStorage.getItem('hub');

  fetch('/api/hubs')
    .then(r => r.json())
    .then(hubs => {
      const grid = document.getElementById('hub-grid');

      if (!hubs.length) {
        grid.innerHTML = `
          <div class="hub-empty" style="grid-column:1/-1;">
            <div style="font-size:48px;">🔌</div>
            <p>No hubs configured yet.<br>
              <a href="/config.html" style="color:var(--primary);font-weight:600;">Add your first hub →</a>
            </p>
          </div>`;
        return;
      }

      grid.innerHTML = hubs.map(h => `
        <div class="hub-card ${saved === h.id ? 'selected' : ''}"
             data-id="${h.id}" data-name="${h.name.replace(/"/g,'&quot;')}" onclick="select(this)">
          <div class="hub-card-icon">${h.image || '🏠'}</div>
          <div class="hub-card-name">${h.name}</div>
          ${h.room ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px;">📍 ${h.room}</div>` : ''}
          <div class="hub-card-status ${h.connected ? 'ok' : ''}">
            ${h.connected ? '● Spotify ready' : '○ Spotify offline'}
          </div>
        </div>
      `).join('');
    })
    .catch(() => {
      document.getElementById('hub-grid').innerHTML =
        '<p style="color:var(--red);text-align:center;grid-column:1/-1;">Could not reach hub server</p>';
    });

  function select(el) {
    const id   = el.dataset.id;
    const name = el.dataset.name;
    localStorage.setItem('hub', id);
    localStorage.setItem('hubName', name);
    // Return to where we came from or go home
    const ret = new URLSearchParams(location.search).get('ret') || '/';
    window.location.replace(ret);
  }
</script>
</body>
</html>
