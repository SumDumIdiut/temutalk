<main class="page astro-page">
  <div class="astro-header">
    <div style="font-size:22px;font-weight:600;color:var(--astro-accent)">Astronomy</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="astro-location" class="astro-loc-chip">Locating…</span>
      <button class="astro-refresh-btn" onclick="astroRefresh()" title="Refresh">↻</button>
    </div>
  </div>

  <!-- Sun -->
  <div class="astro-card" id="astro-sun">
    <div class="astro-card-title">☀️ Sun</div>
    <div class="astro-sun-grid">
      <div class="astro-sun-item"><div class="astro-sun-label">Sunrise</div><div class="astro-sun-val" id="sun-rise">—</div></div>
      <div class="astro-sun-item"><div class="astro-sun-label">Solar Noon</div><div class="astro-sun-val" id="sun-noon">—</div></div>
      <div class="astro-sun-item"><div class="astro-sun-label">Sunset</div><div class="astro-sun-val" id="sun-set">—</div></div>
      <div class="astro-sun-item"><div class="astro-sun-label">Day Length</div><div class="astro-sun-val" id="sun-len">—</div></div>
      <div class="astro-sun-item"><div class="astro-sun-label">Dawn</div><div class="astro-sun-val" id="sun-dawn">—</div></div>
      <div class="astro-sun-item"><div class="astro-sun-label">Dusk</div><div class="astro-sun-val" id="sun-dusk">—</div></div>
    </div>
    <!-- Day arc -->
    <div class="astro-arc-wrap">
      <canvas id="sun-arc" class="astro-arc-canvas" height="90"></canvas>
      <div class="astro-arc-now" id="sun-arc-now">Now</div>
    </div>
  </div>

  <!-- Moon -->
  <div class="astro-card" id="astro-moon">
    <div class="astro-card-title">🌙 Moon</div>
    <div class="astro-moon-row">
      <div class="moon-emoji-wrap">
        <div class="moon-emoji" id="moon-emoji">🌕</div>
        <canvas id="moon-canvas" class="moon-canvas" width="100" height="100"></canvas>
      </div>
      <div class="astro-moon-info">
        <div class="moon-phase-name" id="moon-phase">—</div>
        <div class="moon-illum" id="moon-illum">—% illuminated</div>
        <div class="moon-age"   id="moon-age">—</div>
        <div class="moon-rise-set" id="moon-rise-set">—</div>
      </div>
    </div>
  </div>

  <!-- ISS -->
  <div class="astro-card" id="astro-iss">
    <div class="astro-card-title">🛰️ ISS — Now</div>
    <div class="astro-iss-row">
      <div class="astro-iss-stat"><div class="astro-iss-label">Latitude</div><div class="astro-iss-val" id="iss-lat">—</div></div>
      <div class="astro-iss-stat"><div class="astro-iss-label">Longitude</div><div class="astro-iss-val" id="iss-lng">—</div></div>
      <div class="astro-iss-stat"><div class="astro-iss-label">Altitude</div><div class="astro-iss-val">~408 km</div></div>
      <div class="astro-iss-stat"><div class="astro-iss-label">Speed</div><div class="astro-iss-val">~27,600 km/h</div></div>
    </div>
    <div class="astro-iss-mini-map" id="iss-map-wrap">
      <canvas id="iss-map" class="iss-map-canvas" height="120"></canvas>
      <div class="iss-dot" id="iss-dot" style="display:none">🛰</div>
    </div>
    <div class="astro-iss-note" id="iss-overhead">Checking visibility from your location…</div>
  </div>

  <!-- Planets -->
  <div class="astro-card" id="astro-planets">
    <div class="astro-card-title">🪐 Planets Tonight</div>
    <div class="astro-planets-grid" id="planets-grid">
      <div style="color:var(--text-muted);font-size:13px;padding:12px 0">Calculating…</div>
    </div>
  </div>

  <!-- Constellations / Events -->
  <div class="astro-card" id="astro-events">
    <div class="astro-card-title">✨ Sky Events</div>
    <div id="astro-events-list" class="astro-events-list">
      <div style="color:var(--text-muted);font-size:13px;padding:12px 0">Loading events…</div>
    </div>
  </div>
</main>
