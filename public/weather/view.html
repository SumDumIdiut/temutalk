  <main class="page">
    <div class="wx-city-bar">
      <svg class="wx-city-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      <input type="text" id="wx-city-input" class="wx-city-inp" placeholder="Search city…" autocomplete="off" onkeydown="if(event.key==='Enter')changeWxCity()">
      <button class="wx-city-btn" onclick="changeWxCity()" title="Search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
    </div>
    <div id="hero-wrap"><div class="wx-skeleton skeleton"></div></div>
    <div id="stats-wrap" style="display:none;"><div class="wx-stats" id="stats-grid"></div></div>
    <div id="sun-wrap"   style="display:none;"><div class="wx-sun-row" id="sun-row"></div></div>
    <div id="hourly-wrap" style="display:none;" class="wx-section">
      <div class="wx-section-head">Hourly</div>
      <div class="wx-hourly-scroll" id="hourly-row"></div>
    </div>
    <div id="daily-wrap" style="display:none;" class="wx-section">
      <div class="wx-section-head">7-Day Forecast</div>
      <div class="wx-day-list" id="daily-list"></div>
    </div>
  </main>
